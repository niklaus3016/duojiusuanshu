name: Build Android APK (Debug + Release)

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'capacitor.config.*'
      - 'index.html'
      - '.github/workflows/**'
  workflow_dispatch:  # 允许手动从 Actions 面板触发

concurrency:
  group: apk-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build 多久算数 Android APK（Debug + Release）
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '22'
      JAVA_VERSION: '17'
      JAVA_DISTRIBUTION: 'zulu'
      # CI 环境下的 keystore 临时落地路径（将从 GitHub Secrets 的 Base64 还原）
      KEYSTORE_FILE: ${{ github.workspace }}/android/duojiusuanshu-release-ci.jks
      # 签名四要素（从 Repository Secrets 注入；未配置时为空，Gradle 回退到 unsigned release）
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------- Node 环境 & npm 依赖 --------
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # -------- Web 生产构建 (Vite) --------
      - name: Build web (Vite production)
        run: npm run build

      # -------- Java / Gradle / Android SDK --------
      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # -------- Capacitor Sync: dist -> android/assets + gradle deps --------
      - name: Capacitor sync (copy web dist to Android)
        run: npx cap sync android

      - name: Grant gradlew executable
        run: chmod +x ./android/gradlew

      # -------- 还原 Release Keystore（Base64 -> .jks 二进制） --------
      - name: Restore release keystore from GitHub Secrets
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_FILE"
          ls -la "$KEYSTORE_FILE"
          echo "KEYSTORE_FILE=$KEYSTORE_FILE 已还原"

      # -------- Gradle: Debug APK --------
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # -------- Gradle: Release APK（带签名，若配置齐全） --------
      - name: Build Release APK (signed if keystore configured)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # -------- 清理 CI 临时 Keystore（虽然 runner 一次性，但清理更稳妥） --------
      - name: Wipe temporary CI keystore
        if: always()
        run: |
          if [ -f "$KEYSTORE_FILE" ]; then
            rm -f "$KEYSTORE_FILE"
            echo "已删除临时 CI keystore: $KEYSTORE_FILE"
          fi

      # -------- 上传 Debug APK artifact --------
      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: duojiusuanshu-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          compression-level: 6
          retention-days: 30

      # -------- 上传 Release APK artifact（根据文件名分 signed / unsigned） --------
      - name: Find & upload Release APK artifact
        run: |
          RELEASE_DIR="android/app/build/outputs/apk/release"
          echo "Release 目录内容:"
          ls -la "$RELEASE_DIR" || true
          SIGNED="$(ls "$RELEASE_DIR"/app-release.apk 2>/dev/null || true)"
          UNSIGNED="$(ls "$RELEASE_DIR"/app-release-unsigned.apk 2>/dev/null || true)"
          if [ -n "$SIGNED" ]; then
            echo "✅ 找到已签名 release APK: $SIGNED"
            echo "artifact_name=duojiusuanshu-release-signed-apk" >> "$GITHUB_OUTPUT"
            echo "artifact_path=$SIGNED" >> "$GITHUB_OUTPUT"
          elif [ -n "$UNSIGNED" ]; then
            echo "⚠️  找到未签名 release APK: $UNSIGNED (keystore 可能未配置)"
            echo "artifact_name=duojiusuanshu-release-unsigned-apk" >> "$GITHUB_OUTPUT"
            echo "artifact_path=$UNSIGNED" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 未找到任何 release APK"
            exit 1
          fi
        id: release-artifact
      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release-artifact.outputs.artifact_name }}
          path: ${{ steps.release-artifact.outputs.artifact_path }}
          compression-level: 6
          retention-days: 90   # Release 包保留更久
